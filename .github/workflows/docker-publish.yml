name: Build and Publish Docker Image

on:
  push:
    paths:
      - '**'
      - '!.github/**'
      - '!*.md'
      - '!docs/**'
      - '!LICENSE'
      - '!NOTICE'
      - '!THIRD-PARTY-LICENSES.md'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ouqiting/new-api

jobs:
  docker:
    runs-on: ubuntu-latest
    outputs:
      started_at: ${{ steps.timing.outputs.started_at }}

    steps:
      - name: Record workflow start time
        id: timing
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "Please configure DOCKERHUB_USERNAME and DOCKERHUB_TOKEN in GitHub repository secrets."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short,prefix=sha-

      - name: Build and push Docker image
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    runs-on: ubuntu-latest
    needs: docker
    if: ${{ always() }}

    steps:
      - name: Notify Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DOCKER_JOB_RESULT: ${{ needs.docker.result }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || github.sha }}
          STARTED_AT: ${{ needs.docker.outputs.started_at }}
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import urllib.error
          import urllib.request

          webhook_url = os.environ.get("DISCORD_WEBHOOK_URL", "").strip()
          if not webhook_url:
              raise SystemExit(0)

          docker_job_result = os.environ.get("DOCKER_JOB_RESULT", "").strip().lower()
          success = docker_job_result == "success"
          result_text = "成功" if success else "失败"
          color = 0x57F287 if success else 0xED4245
          started_at = int(os.environ.get("STARTED_AT", "0") or "0")
          elapsed_seconds = max(int(time.time()) - started_at, 0) if started_at else 0
          minutes, seconds = divmod(elapsed_seconds, 60)
          duration_text = f"{minutes}分{seconds}秒" if minutes else f"{seconds}秒"
          commit_message = os.environ.get("COMMIT_MESSAGE", "").strip().splitlines()[0]

          payload = {
              "embeds": [
                  {
                      "title": "Docker 构建通知",
                      "color": color,
                      "fields": [
                          {
                              "name": "运行结果",
                              "value": result_text,
                              "inline": False,
                          },
                          {
                              "name": "耗时",
                              "value": duration_text,
                              "inline": False,
                          },
                          {
                              "name": "提交名称",
                              "value": commit_message or "(空)",
                              "inline": False,
                          },
                      ],
                  }
              ]
          }

          request = urllib.request.Request(
              webhook_url,
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "Accept": "application/json",
                  "User-Agent": "GitHubActions-DiscordWebhook/1.0",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(request) as response:
                  if response.status >= 400:
                      raise RuntimeError(f"Discord webhook failed with status {response.status}")
          except urllib.error.HTTPError as exc:
              body = exc.read().decode("utf-8", errors="replace")
              raise RuntimeError(f"Discord webhook failed with status {exc.code}: {body}") from exc
          PY
